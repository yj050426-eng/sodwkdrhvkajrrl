<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>AI 레시피 추천</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- 시작 화면 -->
  <div id="start-screen">

    <h1>
      💖 AI 레시피 추천 💖
    </h1>

    <button id="start-btn">
      시작하기
    </button>

  </div>


  <!-- 메인 화면 -->
  <div id="main-screen">

    <h1>
      🍳 냉장고 재료 입력
    </h1>

    <input
      type="text"
      id="ingredient-input"
      placeholder="재료 입력"
    >

    <button id="add-btn">
      추가
    </button>

    <button id="recommend-btn">
      레시피 추천받기
    </button>

    <div id="ingredients-list"></div>

    <div id="result"></div>

  </div>


  <!-- 배경음악 -->
  <audio
    id="bgm"
    preload="auto"
    loop
  >

    <source
      src="./bgm.mp3"
      type="audio/mpeg"
    >

  </audio>


  <script src="script.js"></script>

</body>
</html>
